<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>모든 강좌 | 그릿에듀학원</title>

  <meta name="description" content="그릿에듀학원의 국어, 영어, 수학, 과학, 수리논술 온라인 강좌와 오프라인 수업을 확인하세요.">
  <link rel="canonical" href="https://gritedu.kr/courses.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:site_name" content="그릿에듀학원">
  <meta property="og:title" content="모든 강좌 | 그릿에듀학원">
  <meta property="og:description" content="그릿에듀학원의 국어, 영어, 수학, 과학, 수리논술 온라인 강좌와 오프라인 수업을 확인하세요.">
  <meta property="og:url" content="https://gritedu.kr/courses.html">
  <meta property="og:image" content="https://gritedu.kr/assets/main.png">

  <link rel="icon" href="/assets/favicon.png" type="image/png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#ff7a00" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    (function() {
      const THEME_KEY = "grit-theme";
      function getCurrentTheme() {
        try {
          return localStorage.getItem(THEME_KEY) ||
            (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        } catch {
          return "light";
        }
      }
      const theme = getCurrentTheme();
      document.documentElement.setAttribute("data-theme", theme);

      const link = document.createElement("link");
      link.rel = "preload";
      link.as = "image";
      link.href = theme === "dark" ? "/assets/lightmode.png" : "/assets/darkmode.png";
      document.head.appendChild(link);
    })();
  </script>

  <script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/common.js"></script>
  <script src="/assets/js/pwa-register.js" defer></script>
  <script type="module" src="/assets/js/pages/courses.js"></script>
  <script type="module" src="/assets/js/utils/scroll-animations.js"></script>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>
  <div data-include="header"></div>

  <main class="grit-page-container courses">
    <header class="courses-page-header">
      <h1 class="page-title">그릿에듀 모든 강좌</h1>
      <p class="muted" style="text-align:center;line-height:1.7;">
        그릿에듀학원의 온라인 강좌와 오프라인 수업을 통해 과목별 학습 흐름을 확인하세요.<br>
        국어, 영어, 수학, 과학, 수리논술을 중심으로 중고등 내신과 입시를 위한 강좌를 안내합니다.
      </p>
    </header>

    <section class="grit-section courses-toolbar-section" aria-label="강좌 검색 및 필터">
      <div class="course-toolbar admin-toolbar" role="search">
        <div class="toolbar-filters">
          <select id="filterYear" class="admin-toolbar__select">
            <option value="all">연도</option>
          </select>
          <select id="filterGrade" class="admin-toolbar__select">
            <option value="all">학년</option>
          </select>
          <select id="filterSubject" class="admin-toolbar__select">
            <option value="all">과목</option>
          </select>
        </div>
        <div class="toolbar-search">
          <div class="admin-toolbar__search-wrap">
            <input type="text" id="courseSearch" class="admin-toolbar__search-input" placeholder="강좌명/내용 검색" autocomplete="off" enterkeyhint="search" />
          </div>
        </div>
      </div>
    </section>

    <section class="grit-section courses-all-page" aria-label="강좌 목록">
      <p id="coursesSearchMeta" class="courses-search-meta" aria-live="polite" hidden></p>

      <div class="course-grid" id="contentGrid">
        <div class="muted" style="text-align:center;padding:40px;">로딩 중...</div>
      </div>

      <nav id="contentPagination" class="courses-pagination" style="display:none;" aria-label="강좌 목록 페이지"></nav>

      <p id="contentEmpty" class="muted" hidden>선택한 조건에 맞는 강좌가 아직 등록되지 않았습니다.</p>
    </section>
  </main>

  <div data-include="footer"></div>
</body>
</html>
