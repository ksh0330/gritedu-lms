<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>그릿에듀 | 학생 관리</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#ff7a00" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/common.js"></script>
  <script src="/assets/js/pwa-register.js" defer></script>
  <script type="module" src="/assets/js/pages/admin-students.js"></script>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/pages/admin-students.css">
</head>
<body>
  <div data-include="header"></div>

  <main class="grit-page-container">
    <div class="dash-back">
      <a href="/members/admin/dashboard.html" class="btn sm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        관리자 CMS로 돌아가기
      </a>
    </div>
    
    <div class="section-head page-header-row">
      <div>
        <h1 class="page-title">학생 관리</h1>
        <p class="desc">학생 기본 정보와 온라인 강좌/오프라인 반 연결 현황을 확인합니다.</p>
      </div>
      <div class="page-header-actions">
        <button class="btn primary sm" id="loadStudentsStatus" onclick="loadStudentStatus()" title="학생 현황 불러오기">
          현황 불러오기
        </button>
        <button class="btn primary sm" id="refreshStudentsBtn" onclick="refreshStudents()" title="학생 목록 새로고침" hidden disabled>
          새로고침
        </button>
        <button class="btn sm" id="dlStudents">
          엑셀
        </button>
      </div>
    </div>

    <section class="grit-section">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
        <div>
          <h2 style="margin:0;font-size:18px;">학생 목록</h2>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">
            학생 기본 정보와 온라인 강좌/오프라인 반 연결 현황을 표시합니다.
          </div>
        </div>
        <div id="studentStats" style="display:flex;gap:12px;font-size:13px;">
          <div style="padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;">
            <span style="color:var(--muted);">전체:</span> <strong id="statTotal">0</strong>
          </div>
          <div style="padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;">
            <span style="color:var(--muted);">학생:</span> <strong id="statStudents">0</strong>
          </div>
          <div id="statParentsWrap" style="display:none;" aria-hidden="true">
            <span style="color:var(--muted);">학부모:</span> <strong id="statParents">0</strong>
          </div>
          <div style="padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;">
            <span style="color:var(--muted);">수강 중:</span> <strong id="statEnrolled">0</strong>
          </div>
        </div>
      </div>
      <div class="admin-toolbar">
        <label class="sr-only" for="searchStudents">학생 검색</label>
        <div class="admin-toolbar__search-wrap">
          <span class="admin-toolbar__search-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7.25"/><path d="M20 20l-3.5-3.5"/></svg>
          </span>
          <input type="text" id="searchStudents" class="admin-toolbar__search-input" placeholder="이름, 학교, 전화번호, 이메일 검색" autocomplete="off">
        </div>
        <select id="filterRole" class="admin-toolbar__select" title="역할 필터" style="display:none;" aria-hidden="true">
          <option value="student">학생</option>
        </select>
      </div>

      <div class="admin-table-wrap admin-students-table-wrap">
        <table class="admin-table" id="tblStudents">
        <thead>
          <tr>
            <th>이름</th>
            <th>학교</th>
            <th>학년</th>
            <th>전화번호</th>
            <th>이메일</th>
            <th>가입 경로</th>
            <th>온라인 강좌</th>
            <th>오프라인 반</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody></tbody>
        </table>
      </div>
      <div id="paginationContainer"></div>

      <!-- Toast 메시지 (항상 고정 위치) -->
      <div id="statusMsg" style="position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:10000;min-width:300px;max-width:90%;text-align:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease;"></div>
    </section>
  </main>

  <!-- 학생 상세 모달 -->
  <div id="enrollmentDetailModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>학생 상세 정보</h2>
        <button class="modal-close" onclick="closeEnrollmentDetailModal()">&times;</button>
      </div>
      <div id="enrollmentDetailContent">
        <div class="muted" style="padding:8px;">로딩 중...</div>
      </div>
    </div>
  </div>

  <!-- 사용자 수정 모달 -->
  <div id="editUserModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>학생 기본 정보 수정</h2>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <form id="editUserForm">
        <div class="form-group">
          <label>이름 <span class="required">*</span></label>
          <input type="text" id="editUserName" required>
        </div>
        <div class="form-group" id="editUserSchoolGroup">
          <label>학교</label>
          <input type="text" id="editUserSchool">
        </div>
        <div class="form-group" id="editUserGradeGroup">
          <label>학년</label>
          <select id="editUserGrade">
            <option value="">선택하세요</option>
            <option value="1">중1</option>
            <option value="2">중2</option>
            <option value="3">중3</option>
            <option value="4">고1</option>
            <option value="5">고2</option>
            <option value="6">고3</option>
            <option value="7">졸업</option>
          </select>
        </div>
        <div class="form-group">
          <label>전화번호</label>
          <input type="tel" id="editUserPhone">
        </div>
        <div class="form-group">
          <label>가입 경로</label>
          <select id="editUserSignupSource">
            <option value="">선택 없음</option>
            <option value="search">인터넷 검색</option>
            <option value="sns">SNS</option>
            <option value="friend">지인 소개</option>
            <option value="ad">광고/홍보</option>
            <option value="other">기타</option>
          </select>
        </div>
        <div class="form-group" id="editUserSignupSourceOtherGroup" style="display:none;">
          <label>기타 가입 경로</label>
          <input type="text" id="editUserSignupSourceOther" placeholder="가입 경로를 입력하세요">
        </div>
        <div class="form-group">
          <label>비고</label>
          <textarea id="editUserNote" rows="3"></textarea>
        </div>
        <div class="form-group" style="margin-top:20px;">
          <button type="submit" class="btn primary">저장</button>
          <button type="button" class="btn" onclick="closeEditModal()">취소</button>
        </div>
      </form>
    </div>
  </div>

  <div data-include="footer"></div>

  
</body>
</html>
