<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>그릿에듀 | 일반/학부모 회원 관리</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#ff7a00" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/common.js"></script>
  <script src="/assets/js/pwa-register.js" defer></script>
  <script type="module" src="/assets/js/pages/admin-members.js"></script>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/pages/admin-members.css">
</head>
<body class="admin-members-body">
  <div data-include="header"></div>

  <main class="grit-page-container admin-members-page">
    <div class="dash-back">
      <a href="/members/admin/dashboard.html" class="btn sm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        관리자 CMS로 돌아가기
      </a>
    </div>

    <div class="section-head page-header-row admin-members-page-header">
      <div>
        <h1 class="page-title">일반/학부모 회원 관리</h1>
        <p class="desc">일반 회원과 학부모 회원의 기본 정보, 온라인 수강, 자녀 연동 현황을 확인합니다.</p>
      </div>
      <div class="page-header-actions admin-members-actions">
        <button type="button" class="btn primary sm" id="refreshMembersBtn">현황 불러오기</button>
      </div>
    </div>

    <section class="grit-section">
      <div class="admin-members-section-head">
        <div>
          <h2>회원 목록</h2>
          <p>회원별 상세에서 수강 및 자녀 연동 정보를 확인합니다.</p>
        </div>
      </div>
      <div class="admin-toolbar admin-members-toolbar">
        <label class="sr-only" for="memberKeywordFilter">회원 검색</label>
        <div class="admin-toolbar__search-wrap">
          <span class="admin-toolbar__search-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7.25"/><path d="M20 20l-3.5-3.5"/></svg>
          </span>
          <input type="search" id="memberKeywordFilter" class="admin-toolbar__search-input" placeholder="이름, 이메일, 연락처 검색" aria-label="회원 검색">
        </div>
        <select id="memberPurposeFilter" class="admin-toolbar__select" aria-label="회원 유형 필터">
          <option value="">전체</option>
          <option value="parent">학부모</option>
          <option value="general">일반</option>
        </select>
        <select id="memberSignupSourceFilter" class="admin-toolbar__select" aria-label="가입 경로 필터">
          <option value="">가입 경로 전체</option>
          <option value="search">인터넷 검색</option>
          <option value="friend">지인 소개</option>
          <option value="sns">SNS</option>
          <option value="ad">광고, 홍보</option>
          <option value="other">기타</option>
        </select>
      </div>
      <p id="membersMeta" class="admin-members-meta">현황 불러오기를 누르면 회원 목록을 확인할 수 있습니다.</p>
      <div class="admin-members-table-wrap">
        <table class="admin-table admin-members-table">
          <thead>
            <tr>
              <th>회원 유형</th>
              <th>이름</th>
              <th>이메일</th>
              <th>연락처</th>
              <th>가입 경로</th>
              <th>가입일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="membersTableBody">
            <tr><td colspan="7" class="muted">현황 불러오기를 눌러 회원 목록을 불러오세요.</td></tr>
          </tbody>
        </table>
      </div>
      <div id="memberPagination" class="member-pagination"></div>
    </section>
  </main>

  <div id="memberDetailModal" class="member-detail-modal" hidden>
    <div class="member-detail-dialog" role="dialog" aria-modal="true" aria-labelledby="memberDetailTitle">
      <button type="button" id="closeMemberDetailModal" class="modal-close" aria-label="닫기">×</button>
      <h2 id="memberDetailTitle">회원 상세</h2>
      <div id="memberDetailBody"></div>
    </div>
  </div>

  <div data-include="footer"></div>
</body>
</html>
