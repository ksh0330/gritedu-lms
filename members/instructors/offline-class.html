<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="format-detection" content="telephone=no"/>
  <title>그릿에듀 | 오프라인 반</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#ff7a00" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
<script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/common.js"></script>
  <script src="/assets/js/pwa-register.js" defer></script>
  <script type="module" src="/assets/js/pages/instructor-offline-class.js"></script>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="instructor-offline-class-page">
  <div data-include="header"></div>

  <main class="grit-page-container" id="instructorOfflineClassPage">
    <div class="dash-back">
      <a href="/members/instructors/dashboard.html" class="btn sm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        강사 LMS로 돌아가기
      </a>
    </div>

    <section class="grit-section instructor-offline-class-head" id="offlineClassHead">
      <p class="muted" id="offlineClassLoading">반 정보를 불러오는 중입니다…</p>
    </section>

    <section class="grit-section instructor-offline-members-section" id="offlineMembersSection" hidden>
      <div class="instructor-section-toolbar">
        <h2 class="instructor-section-title">반 학생</h2>
        <p id="offlineMembersMeta" class="instructor-section-meta muted" aria-live="polite"></p>
      </div>
      <div class="instructor-table-wrap">
        <table id="offlineMembersTable" class="progress-table instructor-data-table">
          <thead>
            <tr>
              <th>이름</th>
              <th>학교</th>
              <th>학년</th>
              <th>전화번호</th>
              <th>입반일</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="offlineMembersPagination" class="instructor-pagination"></div>
    </section>

    <section class="grit-section instructor-offline-sessions-section" id="offlineSessionsSection" hidden>
      <div class="instructor-section-toolbar">
        <h2 class="instructor-section-title">수업별 영상</h2>
        <p id="offlineSessionsMeta" class="instructor-section-meta muted" aria-live="polite"></p>
      </div>
      <p class="instructor-offline-access-note muted" id="offlineAccessNote" hidden>
        학생별 시청 가능 여부는 입반일 및 예외 권한 기준으로 관리됩니다.
      </p>
      <div id="offlineSessionsList" class="instructor-offline-sessions-list" aria-live="polite"></div>
      <nav id="offlineSessionsPagination" class="instructor-offline-sessions-pagination" aria-label="수업별 영상 페이지" hidden></nav>
    </section>
  </main>

  <div data-include="footer"></div>
</body>
</html>
