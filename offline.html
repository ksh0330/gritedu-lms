<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff7a00" />
  <title>그릿에듀 | 네트워크 연결 필요</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <style>
    :root {
      color-scheme: light dark;
      --brand: #ff7a00;
      --bg: #fffaf5;
      --surface: #ffffff;
      --text: #202225;
      --muted: #6b7280;
      --border: #eadfce;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111214;
        --surface: #17181b;
        --text: #e9ecf1;
        --muted: #b7bcc7;
        --border: #2a2d33;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(100%, 440px);
      padding: 32px 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    img {
      width: 64px;
      height: 64px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 6px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main aria-labelledby="offlineTitle">
    <img src="/assets/icons/icon-192.png" alt="" width="64" height="64" />
    <h1 id="offlineTitle">현재 네트워크 연결이 필요합니다.</h1>
    <p>로그인, 강의 수강, 관리자 기능은 인터넷 연결 후 이용해 주세요.</p>
    <a href="/">홈으로 이동</a>
  </main>
</body>
</html>
