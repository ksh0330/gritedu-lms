<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>강사 상세 | 그릿에듀학원</title>

  <meta name="description" content="그릿에듀학원 강사진의 담당 과목, 참고 자료, 강좌 정보를 통해 수업 방향을 확인하세요.">
  <link rel="canonical" href="https://gritedu.kr/instructor-details.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:title" content="강사 상세 | 그릿에듀학원">
  <meta property="og:description" content="그릿에듀학원 강사진의 담당 과목, 참고 자료, 강좌 정보를 통해 수업 방향을 확인하세요.">
  <meta property="og:url" content="https://gritedu.kr/instructor-details.html">
  <meta property="og:image" content="https://gritedu.kr/assets/main.png">
  <meta property="og:site_name" content="그릿에듀학원">

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#ff7a00" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  
  <!-- 폰트 로드 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <!-- Pretendard는 CSS에서 @font-face로 로드 (font-display: swap 적용) -->
  
  <!-- 테마 즉시 적용 및 조건부 이미지 프리로드 -->
  <script>
    (function() {
      const THEME_KEY = 'grit-theme';
      function getCurrentTheme() {
        try {
          return localStorage.getItem(THEME_KEY) || 
            (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        } catch {
          return 'light';
        }
      }
      const theme = getCurrentTheme();
      document.documentElement.setAttribute('data-theme', theme);
      
      // 현재 테마에 따라 필요한 이미지만 preload
      const link = document.createElement('link');
      link.rel = 'preload';
      link.as = 'image';
      link.href = theme === 'dark' ? '/assets/lightmode.png' : '/assets/darkmode.png';
      document.head.appendChild(link);
    })();
  </script>
  
  <!-- 헤더/푸터는 common.js에서만 로드 (인라인 fetch와 중복 시 DOM/이벤트가 꼬일 수 있음) -->

  <script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/common.js"></script>
  <script src="/assets/js/pwa-register.js" defer></script>
  <script type="module" src="/assets/js/pages/instructor-details.js"></script>
  <script type="module" src="/assets/js/utils/scroll-animations.js"></script>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body data-page="instructor-details">
  <div data-include="header"></div>

  <main class="grit-page-container" id="instructorPage"
        data-instructor-id="">
    <!-- 히어로 -->
    <section class="instructor-hero" aria-labelledby="heroName">
      <div class="hero-photo-wrapper">
        <img id="heroPhoto"
             class="hero-photo"
             src="https://assets.gritedu.kr/public/instructors/profile/profile.webp"
             alt="강사 프로필 사진"
             loading="lazy" decoding="async">
      </div>
      <div class="hero-content">
        <p class="hero-headline" id="heroHeadline" style="word-break:keep-all;overflow-wrap:break-word;">끝까지 해내는 힘</p>
        <h1 class="hero-title" style="word-break:keep-all;overflow-wrap:break-word;">
          <span id="heroName" style="display:block;">그릿에듀 강사 상세</span>
          <span id="heroSubtitle" class="hero-sub" style="display:block;">과목별 강사진</span>
        </h1>
        <div class="hero-lead" id="heroLead" style="word-break:keep-all;overflow-wrap:break-word;"></div>
      </div>
    </section>

    <!-- 하단 섹션 -->
    <div class="instructor-sections">
      <!-- 소개 영상 -->
      <section class="section-card" id="sectionVideo" aria-labelledby="videoTitle" hidden>
        <h2 id="videoTitle" class="section-title">소개 영상</h2>
        <div id="videoGrid" class="video-grid"></div>
      </section>

      <!-- 참고 자료 -->
      <section class="section-card" id="sectionCurriculum" aria-labelledby="curriculumTitle" hidden>
        <h2 id="curriculumTitle" class="section-title">참고 자료</h2>
        <div id="curriculumImageWrap" class="curriculum-image-wrap"></div>
      </section>

      <!-- 담당 강의 -->
      <section class="section-card" id="sectionCourses" aria-labelledby="coursesTitle" hidden>
        <h2 id="coursesTitle" class="section-title">담당 강좌</h2>
        <div id="assignedCoursesGrid" class="courses-mini-grid"></div>
      </section>

      <!-- 수강 후기 섹션 제거됨 -->
    </div>
  </main>

  <div data-include="footer"></div>

  <div id="curriculumLightbox" class="curriculum-lightbox" role="dialog" aria-modal="true" aria-label="참고 자료 이미지 확대" aria-hidden="true" hidden>
    <button type="button" id="curriculumLightboxClose" class="curriculum-lightbox-close" aria-label="닫기">×</button>
    <button type="button" id="curriculumLightboxPrev" class="curriculum-lightbox-nav is-prev" aria-label="이전 이미지">‹</button>
    <img id="curriculumLightboxImage" class="curriculum-lightbox-image" alt="">
    <button type="button" id="curriculumLightboxNext" class="curriculum-lightbox-nav is-next" aria-label="다음 이미지">›</button>
  </div>

</body>
</html>
